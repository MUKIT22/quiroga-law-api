<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us – Quiroga Law Office</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      width: 100%;
      max-width: 520px;
      padding: 2.5rem;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a2e4a;
      margin-bottom: .4rem;
    }

    .subtitle {
      color: #6b7280;
      font-size: .9rem;
      margin-bottom: 1.8rem;
    }

    label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: .3rem;
    }

    input, textarea {
      width: 100%;
      padding: .65rem .85rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .95rem;
      color: #111827;
      transition: border-color .2s;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #1a2e4a;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    textarea {
      resize: vertical;
      min-height: 130px;
    }

    button[type="submit"] {
      width: 100%;
      padding: .75rem;
      background: #1a2e4a;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background .2s;
      margin-top: .4rem;
    }

    button[type="submit"]:hover  { background: #243f6a; }
    button[type="submit"]:active { background: #102035; }

    #status {
      margin-top: 1rem;
      font-size: .9rem;
      border-radius: 6px;
      padding: .7rem 1rem;
      display: none;
    }

    #status.success {
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #6ee7b7;
      display: block;
    }

    #status.error {
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Contact Us</h1>
    <p class="subtitle">Fill out the form below and our team will get back to you shortly.</p>

    <form id="contactForm" novalidate>
      <div class="field">
        <label for="name">Full Name</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="e.g. Maria Perez"
          required
        />
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="e.g. maria@example.com"
          required
        />
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea
          id="message"
          name="message"
          placeholder="How can we help you?"
          required
        ></textarea>
      </div>

      <button type="submit">Send Message</button>
    </form>

    <div id="status"></div>
  </div>

  <script>
    const form   = document.getElementById('contactForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.className = '';
      status.style.display = 'none';

      const payload = {
        name:    document.getElementById('name').value.trim(),
        email:   document.getElementById('email').value.trim(),
        message: document.getElementById('message').value.trim()
      };

      try {
        const response = await fetch('/api/contact', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload)
        });

        const data = await response.json();

        if (response.ok) {
          status.textContent = data.message;
          status.className = 'success';
          form.reset();
        } else {
          status.textContent = data.error || 'Something went wrong. Please try again.';
          status.className = 'error';
        }
      } catch (err) {
        status.textContent = 'Unable to reach the server. Please try again later.';
        status.className = 'error';
      }
    });
  </script>
</body>
</html>
